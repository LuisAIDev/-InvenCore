# Server
server.port=${PORT:8080}

# PostgreSQL - Railway provee estas variables automaticamente
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:invencore_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:REDACTED}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:REDACTED}
jwt.expiration=${JWT_EXPIRATION:86400000}
