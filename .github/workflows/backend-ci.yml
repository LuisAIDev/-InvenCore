name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn clean compile --batch-mode

      - name: Test
        run: mvn test --batch-mode -DfailIfNoTests=false
